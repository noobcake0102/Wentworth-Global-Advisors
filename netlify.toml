# Netlify configuration for Wentworth Global Advisors
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

# Pretty URLs handling: keep trailing slashes (the canonical form already used
# in <link rel="canonical">), so /services and /services/ both resolve cleanly.
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# ---------------------------------------------------------------------------
# Security & SEO headers — applied to every response
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Long-lived cache for static assets (CSS, logos, fonts referenced via /assets/)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages get a short cache so updates appear quickly after redeploy
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
